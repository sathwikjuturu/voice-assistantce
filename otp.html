<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceMail AI - Smart Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Smooth transitions between pages */
        body {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
    </style>
    <script>
        // Make splash redirect automatically
        window.onload = function() {
            if (window.location.pathname.endsWith('splash.html') || window.location.pathname.endsWith('/')) {
                setTimeout(function() {
                    window.location.href = 'onboarding1.html';
                }, 2500);
            }
        };
    </script>
</head>
<body>
<div id="app">

    <div class="auth-wrapper">
        <div class="auth-box glass-panel">
            <h2>Verify Email</h2>
            <p>Enter the 4-digit code sent to your email</p>
            <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
                <input type="text" maxlength="1" style="width: 50px; height: 60px; font-size: 1.5rem; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white;">
                <input type="text" maxlength="1" style="width: 50px; height: 60px; font-size: 1.5rem; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white;">
                <input type="text" maxlength="1" style="width: 50px; height: 60px; font-size: 1.5rem; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white;">
                <input type="text" maxlength="1" style="width: 50px; height: 60px; font-size: 1.5rem; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white;">
            </div>
            <button class="btn" onclick="window.location.href='dashboard.html'">Verify & Continue</button>
        </div>
    </div>

</div>
    <!-- Toast Notifications -->
    <div id="toast-container"></div>
<script src="js/app.js"></script>
    <script src="js/voice-engine.js"></script>
</body>
</html>
