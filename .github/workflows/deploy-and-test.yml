name: Deploy and Live Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Deploy to GitHub Pages (best-effort) ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    continue-on-error: true   # never blocks the test job if Pages is not configured
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static files
        run: python tests/build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 2: E2E Selenium Tests (always runs against localhost) ───────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Build and Serve static files
        run: |
          python tests/build.py
          python -m http.server 3000 --directory dist &
          sleep 3

      - name: Run E2E Selenium Tests
        env:
          BASE_URL: http://localhost:3000
        run: python tests/run_tests.py

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Results
          path: Test Results/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test Summary not found!" >> $GITHUB_STEP_SUMMARY
          fi
