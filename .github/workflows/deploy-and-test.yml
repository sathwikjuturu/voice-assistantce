name: Deploy and Live Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Single job: build, serve locally, run E2E tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        run: npm install -g chromedriver --detect_chromedriver_version

      - name: Build static files
        run: python tests/build.py

      - name: Start local server
        run: |
          python -m http.server 3000 --directory dist &
          sleep 3

      - name: Run E2E Selenium Tests
        env:
          BASE_URL: http://localhost:3000
        run: python tests/run_tests.py

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Results
          path: Test Results/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "Test summary not found." >> $GITHUB_STEP_SUMMARY
          fi
