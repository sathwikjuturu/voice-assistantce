name: Deploy and Live Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build / Package static files
        run: python tests/build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run E2E Selenium Tests
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ -z "$BASE_URL" ] || [ "$BASE_URL" = "null" ]; then
            echo "BASE_URL is empty or null. Starting a local static file server for fallback testing..."
            python tests/build.py
            python -m http.server 3000 --directory dist &
            sleep 3
            export BASE_URL="http://localhost:3000"
          fi
          python tests/run_tests.py

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Results
          path: Test Results/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test Summary not found!" >> $GITHUB_STEP_SUMMARY
          fi
