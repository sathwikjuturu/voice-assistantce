name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build static files
        run: python tests/build.py

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Sync Capacitor Web Assets
        run: npm run cap-sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > ../gradle_build_log.txt 2>&1 || true
          cd ..
          cat gradle_build_log.txt
          echo "### Gradle Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 100 gradle_build_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if grep -q -i "FAILED" gradle_build_log.txt; then
            git config --global user.name "GitHub Action"
            git config --global user.email "actions@github.com"
            git add gradle_build_log.txt
            git commit -m "chore: add Gradle build failure log [skip ci]" || true
            git push origin HEAD:main || true
            exit 1
          fi

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMail-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
