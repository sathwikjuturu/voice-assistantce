name: Load Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests

      - name: Build static files and Start local server for Load Test
        env:
          BASE_URL: http://localhost:3000
        run: |
          # Build static dist folder
          python tests/build.py
          # Serve it with Python's built-in HTTP server (no Supabase needed)
          python -m http.server 3000 --directory dist &
          sleep 3
          python tests/run_load_test.py

      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Load-Test-Results
          path: Test Results/Load/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Load/load_test_report.md" ]; then
            cat "Test Results/Load/load_test_report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Load Test Summary not found!" >> $GITHUB_STEP_SUMMARY
          fi
