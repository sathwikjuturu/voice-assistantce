name: Mobile Android Appium E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Minimal permissions - no pages deploy needed here
permissions:
  contents: read

# Unique concurrency group - does NOT conflict with 'pages' group in deploy-and-test.yml
concurrency:
  group: "android-e2e-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Install Chrome and ChromeDriver
        run: |
          # GitHub-hosted ubuntu runners already have Chrome installed
          # Install matching chromedriver via npm
          npm install -g chromedriver --detect_chromedriver_version
          chromedriver --version || true
          google-chrome --version || true

      - name: Build static files
        run: python tests/build.py

      - name: Start static server and Run Mobile Web E2E Tests
        env:
          BASE_URL: http://localhost:3000
        run: |
          python -m http.server 3000 --directory dist &
          sleep 3
          python tests/run_tests.py

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Appium-Test-Results
          path: Test Results/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Mobile E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "Test Summary not found - tests may have been skipped." >> $GITHUB_STEP_SUMMARY
          fi
