name: Mobile Android Appium E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Permissions needed for deployment
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-and-test:
    runs-on: macos-13  # macOS has KVM/HAXM virtualization for accelerated Android emulators in Actions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build / Package static files
        run: python tests/build.py

      # Deploy static web app first to establish the site
      - name: Deploy Static Web App
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true

      - name: Install Appium and Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          appium --port 4723 &
          sleep 5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run E2E Mobile Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-spellchecker: true
          script: |
            export BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
            python tests/run_appium_tests.py

      - name: Prepare reports structure for deployment
        if: always()
        run: |
          mkdir -p deploy_reports/reports/latest
          mkdir -p deploy_reports/reports/history/build-${{ github.run_number }}
          
          # Copy outputs to latest report folder
          if [ -d "Test Results/HTML" ]; then
            cp -r "Test Results/HTML/execution-report.html" deploy_reports/reports/latest/
          fi
          if [ -d "Test Results/Summary" ]; then
            cp -r "Test Results/Summary/summary.md" deploy_reports/reports/latest/
          fi
          if [ -d "Test Results/Logs" ]; then
            cp -r "Test Results/Logs" deploy_reports/reports/latest/
          fi
          if [ -d "Test Results/Screenshots" ]; then
            cp -r "Test Results/Screenshots" deploy_reports/reports/latest/
          fi
          
          # Copy outputs to history build folder
          if [ -d "Test Results/HTML" ]; then
            cp -r "Test Results/HTML/execution-report.html" deploy_reports/reports/history/build-${{ github.run_number }}/
          fi
          if [ -d "Test Results/Summary" ]; then
            cp -r "Test Results/Summary/summary.md" deploy_reports/reports/history/build-${{ github.run_number }}/
          fi
          if [ -d "Test Results/Logs" ]; then
            cp -r "Test Results/Logs" deploy_reports/reports/history/build-${{ github.run_number }}/
          fi
          if [ -d "Test Results/Screenshots" ]; then
            cp -r "Test Results/Screenshots" deploy_reports/reports/history/build-${{ github.run_number }}/
          fi

      # Deploy test reports to GitHub Pages without deleting web app files (clean: false)
      - name: Deploy E2E Reports to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_reports
          branch: gh-pages
          clean: false

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Appium-Test-Results
          path: Test Results/

      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test Summary not found!" >> $GITHUB_STEP_SUMMARY
          fi
