name: Appium Mobile E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  appium-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Backend Setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --prefer-offline || npm install

      # ── Python Setup ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Appium Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/appium/requirements_appium.txt

      # ── Android Emulator Setup ───────────────────────────────────────────────
      - name: Setup Android SDK & Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: test_avd
          script: echo "Emulator is ready"
        continue-on-error: true

      # ── Appium Server Setup ──────────────────────────────────────────────────
      - name: Install Appium Server
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
        continue-on-error: true

      # ── Chrome for Fallback ──────────────────────────────────────────────────
      - name: Install Chrome & ChromeDriver (Fallback Mode)
        uses: browser-actions/setup-chrome@v1
        continue-on-error: true

      # ── Run E2E Tests ─────────────────────────────────────────────────────────
      - name: Run Appium Mobile E2E Tests
        env:
          BASE_URL: http://localhost:3000
          APPIUM_URL: http://localhost:4723
          DEVICE_NAME: "Android Emulator"
          PLATFORM_VERSION: "13.0"
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Start Appium Server
          appium server --port 4723 --base-path /wd/hub &
          # Start Backend Server
          node server.js &
          sleep 8
          cd "${{ github.workspace }}"
          python tests/appium/run_appium_e2e.py
        continue-on-error: true

      # ── Upload Reports ─────────────────────────────────────────────────────--
      - name: Upload Appium Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mobile-E2E-Reports
          path: Appium Test Results/
          retention-days: 30

      # ── GitHub Step Summary ──────────────────────────────────────────────────
      - name: Publish Test Summary
        if: always()
        run: |
          if [ -f "Appium Test Results/Summary/mobile_summary.md" ]; then
            cat "Appium Test Results/Summary/mobile_summary.md" >> $GITHUB_STEP_SUMMARY
          fi

