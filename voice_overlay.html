<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceMail AI - Smart Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Smooth transitions between pages */
        body {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
    </style>
    <script>
        // Make splash redirect automatically
        window.onload = function() {
            if (window.location.pathname.endsWith('splash.html') || window.location.pathname.endsWith('/')) {
                setTimeout(function() {
                    window.location.href = 'onboarding1.html';
                }, 2500);
            }
        };
    </script>
</head>
<body>
<div id="app">

    <div class="voice-overlay" onclick="window.history.back()">
        <div class="listening-indicator">
            <i class="fa-solid fa-microphone"></i>
        </div>
        <h2 class="voice-text">"Read my last unread email..."</h2>
        <p style="margin-top: 2rem; color: var(--text-muted);">Listening... (Click anywhere to cancel)</p>
    </div>

</div>
    <!-- Global Floating Mic Button for Voice Commands -->
    <div id="voice-assistant-btn" onclick="window.location.href='voice_overlay.html'">
        <div class="mic-ripple"></div>
        <i class="fa-solid fa-microphone"></i>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
<script src="js/app.js"></script>
    <script src="js/voice-engine.js"></script>
</body>
</html>
